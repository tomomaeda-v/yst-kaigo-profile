if(settings.backendUrl&&CONFIG.backendUrl&&settings.backendUrl!==CONFIG.backendUrl){
  console.log('[v7.5] Clearing stale backendUrl from settings:',settings.backendUrl);
  delete settings.backendUrl;
  localStorage.setItem('yst-kaigo-settings-v1',JSON.stringify(settings));
}
function getBackendUrl(){
  // CONFIG.backendUrl を優先。localStorageに古いURLがあっても無視
  return CONFIG.backendUrl||settings.backendUrl||'';
}

// 既存メンバーの会社フィルタ（詳細画面で使用）
function loadCompatFilter(){try{return JSON.parse(localStorage.getItem('yst-kaigo-compat-filter'))||{};}catch(e){return {};}}
function saveCompatFilter(f){localStorage.setItem('yst-kaigo-compat-filter',JSON.stringify(f));}
function toggleCompatCompany(c){const f=loadCompatFilter();f[c]=!f[c];saveCompatFilter(f);render();}
function resetCompatFilter(){localStorage.removeItem('yst-kaigo-compat-filter');render();}
function isLoggedIn(){return !!(settings&&settings.userName&&settings.loginAt);}

function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{};}catch(e){return{};}}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings));}

// 同期状態
const sync={lastPullAt:null,lastPushAt:null,syncing:false,error:null,pendingPush:false};
let pushTimer=null;
let pullTimer=null;

async function syncPull(silent){
  const _url=getBackendUrl();if(!_url)return;
  sync.syncing=true;updateSyncBadge();
  try{
    const res=await fetch(_url+'?action=read&ts='+Date.now(),{method:'GET'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const data=json.data||json;
    if(Array.isArray(data.submissions))state.submissions=mergeById(state.submissions,data.submissions);
    if(Array.isArray(data.members))state.members=mergeById(state.members,data.members,true);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    sync.lastPullAt=new Date();sync.error=null;
    if(!silent&&MODE==='admin')render();
  }catch(e){sync.error=e.message;console.error('Pull error:',e);}
  finally{sync.syncing=false;updateSyncBadge();}
}

// Pull と Push を両方実行（クリック用）
async function syncBoth(){
  if(sync.syncing)return;
  await syncPush();
  await syncPull();
}

async function syncPush(){
  const _url=getBackendUrl();
  if(!_url){sync.pendingPush=false;return;}
  sync.syncing=true;sync.pendingPush=false;updateSyncBadge();
  try{
    const body={action:'sync',submissions:state.submissions,members:state.members,user:settings.userName||'unknown',ts:new Date().toISOString()};
    const res=await fetch(_url,{method:'POST',body:JSON.stringify(body),headers:{'Content-Type':'text/plain;charset=utf-8'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    sync.lastPushAt=new Date();sync.error=null;
  }catch(e){sync.error=e.message;console.error('Push error:',e);}
  finally{sync.syncing=false;updateSyncBadge();}
}

function schedulePush(){
  sync.pendingPush=true;updateSyncBadge();
  if(pushTimer)clearTimeout(pushTimer);
  pushTimer=setTimeout(syncPush,1500);
}

// ID基準でマージ。updatedAt の新しい方を残す
function mergeById(localArr,remoteArr,preserveLocalOnly){
  const map={};
  (localArr||[]).forEach(it=>{if(it&&it.id)map[it.id]=it;});
  (remoteArr||[]).forEach(it=>{
    if(!it||!it.id)return;
    const ex=map[it.id];
    if(!ex){map[it.id]=it;return;}
    const ru=it.updatedAt||it.submittedAt||'';
    const lu=ex.updatedAt||ex.submittedAt||'';
    if(ru>lu)map[it.id]=it;
  });
  return Object.values(map);
}

function updateSyncBadge(){
  const el=document.getElementById('sync-badge');if(!el)return;
  if(!getBackendUrl()){el.innerHTML='<span style="color:#9CA3AF;font-size:11px;">🔌 ローカル保存</span>';return;}
  if(sync.error){el.innerHTML='<span style="color:#DC2626;font-size:11px;cursor:pointer;text-decoration:underline;" title="クリックで強制同期" onclick="syncBoth()">⚠ 同期エラー（クリックで再試行）</span>';return;}
  if(sync.syncing){el.innerHTML='<span style="color:#2563EB;font-size:11px;">🔄 同期中…</span>';return;}
  if(sync.pendingPush){el.innerHTML='<span style="color:#F59E0B;font-size:11px;">⏳ 保存待機</span>';return;}
  if(sync.lastPullAt||sync.lastPushAt){
    const last=Math.max(sync.lastPullAt||0,sync.lastPushAt||0);
    const secs=Math.floor((Date.now()-last)/1000);
    const t=secs<60?secs+'秒前':secs<3600?Math.floor(secs/60)+'分前':Math.floor(secs/3600)+'時間前';
    el.innerHTML='<span style="color:#059669;font-size:11px;">✓ 同期済み ('+t+')</span>';
    return;
  }
  el.innerHTML='<span style="color:#9CA3AF;font-size:11px;">未同期</span>';
}

// 1分ごとに自動pull、5秒ごとにバッジ更新
setInterval(()=>{updateSyncBadge();},5000);

let state=loadState();
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return{submissions:[],members:seedMembers()};}
function saveState(){
  // 全エンティティに updatedAt/updatedBy をタグ付け（簡易版）
  const now=new Date().toISOString();const u=settings.userName||'unknown';
  state.submissions.forEach(s=>{if(!s.updatedAt){s.updatedAt=now;s.updatedBy=u;}});
  state.members.forEach(m=>{if(!m.updatedAt){m.updatedAt=now;m.updatedBy=u;}});
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  if(MODE==='admin'&&getBackendUrl())schedulePush();
}
// 編集時に呼ぶ - 強制的にupdatedAtを更新
function touchEntity(entity){if(entity){entity.updatedAt=new Date().toISOString();entity.updatedBy=settings.userName||'unknown';}}
function uuid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

//==========================================================
// スコア計算
//==========================================================
function calcScores(answers){
  const t={};const r={};const d={};
  Object.keys(TRAITS).forEach(k=>t[k]=0);
  Object.keys(RISKS).forEach(k=>r[k]=0);
  Object.keys(DRIVES).forEach(k=>d[k+'_d']=0);// money_d, prestige_d, freedom_d, relation_d
  QUESTIONS.forEach(q=>{
    if(q.type==='text')return;
    const sel=answers[q.id];if(sel==null)return;
    const opt=q.options[sel];if(!opt)return;
    Object.entries(opt.s||{}).forEach(([k,v])=>{
      if(k in t)t[k]+=v;
      if(k in r)r[k]+=v;
      if(k in d)d[k]+=v;
    });
  });
  // 0-10に正規化（各特性の最大ポイントから）
  const norm={};
  Object.keys(TRAITS).forEach(k=>{
    const max=Math.max(2,maxPossible(k));
    norm[k]=Math.max(0,Math.min(10,(t[k]/max)*5+5));
  });
  const normR={};
  Object.keys(RISKS).forEach(k=>{
    const max=Math.max(2,maxPossible(k));
    normR[k]=Math.max(0,Math.min(10,(r[k]/max)*5+5));
  });
  // ドライブは合計を100%で正規化
  const driveTotal=Object.values(d).reduce((a,b)=>a+Math.max(0,b),0);
  const normD={};
  Object.keys(DRIVES).forEach(k=>{
    const v=Math.max(0,d[k+'_d']);
    normD[k]=driveTotal>0?(v/driveTotal)*100:25;
  });
  return{traits:norm,risks:normR,drives:normD,raw:t,rawRisks:r,rawDrives:d};
}
function maxPossible(key){
  let s=0;
  QUESTIONS.forEach(q=>{
    if(q.type==='text')return;
    let m=0;
    q.options.forEach(o=>{m=Math.max(m,Math.abs((o.s||{})[key]||0));});
    s+=m;
  });
  return s;
}

// リスクフラグ判定
function countSignals(answers,key,positive){
  if(!answers)return 99;
  let c=0;
  QUESTIONS.forEach(q=>{
    if(q.type==='text')return;
    const sel=answers[q.id];if(sel==null)return;
    const opt=q.options[sel];if(!opt)return;
    const v=(opt.s||{})[key]||0;
    if(positive&&v>0)c++;else if(!positive&&v<0)c++;
  });
  return c;
}
function detectFlags(scores,answers){
  const f=[];const t=scores.traits;const r=scores.risks;const d=scores.drives||{};
  if(t.emo<3)f.push({level:'red',label:'情緒不安定（短気リスク）'});
  if(t.rule<3)f.push({level:'red',label:'規範意識が低い'});
  if(t.integ<3)f.push({level:'red',label:'誠実さに懸念'});
  if(t.empathy<3)f.push({level:'red',label:'共感性が低い'});

  if(t.careAcc<3)f.push({level:'red',label:'身体介助への抵抗感が強い'});
  else if(t.careAcc<4.5&&countSignals(answers,'careAcc',false)>=2)f.push({level:'yellow',label:'介助受容性に懸念'});
  if(t.long<4&&countSignals(answers,'long',false)>=2)f.push({level:'yellow',label:'長期就労意欲が弱い'});
  if(t.clean<4&&countSignals(answers,'clean',false)>=2)f.push({level:'yellow',label:'清潔感に要指導'});
  if(t.resil<4&&countSignals(answers,'resil',false)>=2)f.push({level:'yellow',label:'ストレス耐性が低い'});
  if(t.fin<4&&countSignals(answers,'fin',false)>=2)f.push({level:'yellow',label:'金銭管理に懸念'});
  if(t.fam<4&&countSignals(answers,'fam',false)>=2)f.push({level:'yellow',label:'家族支援が弱い'});
  if(r.alc>7&&countSignals(answers,'alc',true)>=2)f.push({level:'red',label:'飲酒頻度が高い'});
  if(r.smoke>7)f.push({level:'yellow',label:'喫煙習慣あり'});
  if(r.digi>7&&countSignals(answers,'digi',true)>=2)f.push({level:'yellow',label:'スマホ依存傾向'});
  if(r.avoid>7&&countSignals(answers,'avoid',true)>=2)f.push({level:'yellow',label:'対立回避が強い'});
  if(r.impulse>7&&countSignals(answers,'impulse',true)>=2)f.push({level:'red',label:'衝動性高'});
  if(r.revenge>7&&countSignals(answers,'revenge',true)>=2)f.push({level:'red',label:'見返し・復讐心が強い'});
  if(d.money>50)f.push({level:'yellow',label:'金銭ドライブ過剰'});
  if(d.prestige>50)f.push({level:'yellow',label:'承認・プライド過剰'});
  if(d.freedom>50)f.push({level:'yellow',label:'自由志向過剰'});
  return f;
}

// 動機ドライブから候補者タイプを判定
function getDriveType(drives){
  const max=Object.entries(drives).sort((a,b)=>b[1]-a[1])[0];
  const types={
    money:{ja:'💰 金銭ドライブ型',desc:'稼ぐことが第一動機。給料・手当に敏感。'},
    prestige:{ja:'⭐ 承認ドライブ型',desc:'認められることを重視。プライドが高く褒めると伸びる。'},
    freedom:{ja:'🕊 自由ドライブ型',desc:'拘束を嫌う。裁量を与えると力を発揮。'},
    relation:{ja:'🤝 関係ドライブ型',desc:'人とのつながりが第一。チーム配属で活きる。'}
  };
  return{type:max[0],pct:max[1].toFixed(0),...types[max[0]]};
}

// 既存メンバーとの相性計算
function calcCompatibility(candScores,memb){
  let sim=0,total=0;
  Object.keys(TRAITS).forEach(k=>{
    const a=candScores.traits[k];const b=memb.traits[k];
    sim+=10-Math.abs(a-b);total+=10;
  });
  let score=(sim/total)*10;
  const risks=[],positives=[];
  const cT=candScores.traits,mT=memb.traits;
  const cR=candScores.risks,mR=memb.risks||{};
  const cD=candScores.drives||{},mD=memb.drives||{};
  // 性格リスク補正
  if(cT.emo<5&&mT.emo<5){score-=1.5;risks.push('両者とも情緒不安定→寮内衝突リスク');}
  if(cR.alc>6&&(mR.alc||0)>6){score-=1;risks.push('両者とも飲酒頻度高→飲み過ぎリスク');}
  if(cT.clean<5&&mT.clean<5){score-=1;risks.push('両者とも清潔感低→寮の衛生問題');}
  if(cT.rule<5&&mT.rule<5){score-=1;risks.push('両者ともルール意識低→規律問題');}
  // 衝動性・見返し心
  if(cR.impulse>6&&(mR.impulse||0)>6){score-=1.5;risks.push('両者とも衝動性高→些細な事で衝突');}
  if(cR.revenge>6&&(mR.revenge||0)>6){score-=1.5;risks.push('両者とも見返し心強→不仲長期化リスク');}
  // 動機ドライブの組み合わせ
  if((cD.prestige||0)>40&&(mD.prestige||0)>40){score-=1;risks.push('両者とも承認欲求強→マウント取り合いリスク');}
  if((cD.money||0)>45&&(mD.money||0)>45){score-=0.5;risks.push('両者とも金銭ドライブ過剰→ボーナス・待遇で揉める可能性');}
  if((cD.freedom||0)>45&&mT.rule>=7){score-=0.5;risks.push('候補者が自由志向、メンバーがルール重視→価値観衝突');}
  // 補完・ポジティブ
  if(memb.isBenchmark&&cT.consc>=6){positives.push('ベンチマーク先輩の指導を素直に受けやすい');}
  if(mT.comm>=7&&cT.comm<5){positives.push('コミュ強メンバーが候補者の弱みを補完');}
  if(mT.long>=8&&cT.long>=7){positives.push('双方が長期就労意欲で安定したチーム');}
  if((cD.relation||0)>35&&(mD.relation||0)>35){positives.push('双方が関係ドライブ型→絆を作りやすい');}
  if((cD.prestige||0)>35&&mT.comm>=7){positives.push('プライド型候補に対し、コミュ強メンバーが褒めて伸ばせる');}
  if((cD.money||0)>35&&(mD.money||0)>35&&cT.long>=6&&mT.long>=6){positives.push('双方が金銭志向＋長期意欲→稼ぐパートナーシップ');}

  score=Math.max(1,Math.min(10,score));
  let advice;
  if(score>=8)advice='同寮・近接配置を強く推奨';
  else if(score>=6)advice='問題なし、近接配置可';
  else if(score>=4)advice='近接配置可、ただし初期1ヶ月は密に観察';
  else advice='別寮を強く推奨';
  return{score,sim:sim/total,risks,positives,advice};
}

function startTimer(seconds){
  if(quiz.timerInterval)clearInterval(quiz.timerInterval);
  quiz.timerStart=Date.now();
  quiz.timerSec=seconds;
  quiz.timerInterval=setInterval(()=>{
    const el=document.getElementById('quiz-timer');
    if(!el){clearInterval(quiz.timerInterval);return;}
    const elapsed=(Date.now()-quiz.timerStart)/1000;
    const r=Math.max(0,quiz.timerSec-elapsed);
    el.textContent=Math.ceil(r);
    if(r<=0){el.style.color='#DC2626';el.style.transform='scale(1.3)';}
    else if(r<3){el.style.color='#DC2626';el.style.transform='scale(1.1)';}
    else if(r<5){el.style.color='#F59E0B';el.style.transform='scale(1)';}
    else{el.style.color='#059669';el.style.transform='scale(1)';}
  },200);
}

async function submitQuiz(){
  if(quiz.submitting)return;
  quiz.submitting=true;
  const _btn=document.getElementById('nextBtn');
  if(_btn){_btn.disabled=true;_btn.textContent='Mengirim... / 送信中...';}
  const submission={
    id:uuid(),
    submittedAt:new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    updatedBy:'candidate:'+quiz.name,
    name:quiz.name,
    email:quiz.email,
    answers:quiz.answers,
    timing:quiz.timing||{}
  };
  // ローカル保存
  state.submissions.push(submission);
  saveState();
  // バックエンド設定があれば直接送信
  let directSent=false;
  const _qUrl=getBackendUrl();
  if(_qUrl){
    try{
      const body={action:'sync',submissions:[submission],members:[],user:'candidate:'+quiz.name,ts:new Date().toISOString()};
      await fetch(_qUrl,{method:'POST',body:JSON.stringify(body),headers:{'Content-Type':'text/plain;charset=utf-8'}});
      directSent=true;
    }catch(e){console.error('Direct submit failed:',e);}
  }
  // 送信コード（直接送信できなかった場合のフォールバック用）
  const codePayload={n:quiz.name,e:quiz.email,a:quiz.answers,t:submission.submittedAt};
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(codePayload))));
  quiz.step='done';
  quiz.code=code;
  quiz.directSent=directSent;
  render();
}

function dedupSubmissions(subs){
  if(!subs||subs.length===0)return [];
  const sorted=[...subs].sort((a,b)=>String(b.submittedAt||'').localeCompare(String(a.submittedAt||'')));
  const seen={};
  return sorted.filter(s=>{
    if(!s)return false;
    const nm=String(s.name||'').toLowerCase().trim();
    const em=String(s.email||'').toLowerCase().trim();
    const k=nm+'|'+em;
    if(!k.trim())return true;
    if(seen[k])return false;
    seen[k]=true;return true;
  });
}
function calcOvertimeStats(s){
  if(!s||!s.timing)return{count:0,avg:0,total:0};
  let count=0,sum=0,total=0;
  Object.entries(s.timing).forEach(([qid,t])=>{
    const q=QUESTIONS.find(x=>x.id===qid);
    if(!q)return;
    total++;
    sum+=t;
    const limit=q.sec==='9'?8:15;
    if(t>limit)count++;
  });
  return{count,avg:total>0?Math.round((sum/total)*10)/10:0,total};
}

function dedupCleanup(){
  const before=state.submissions.length;
  const ded=dedupSubmissions(state.submissions);
  const removed=before-ded.length;
  if(removed===0){alert('重複は見つかりませんでした');return;}
  if(!confirm(removed+'件の重複を削除します。続行しますか？'))return;
  state.submissions=ded;saveState();render();alert(removed+'件削除しました');
}

function generateAdvice(sc,compats,flags){
  const t=sc.traits;const r=sc.risks;const d=sc.drives||{};
  const top3=Object.entries(t).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>TRAITS[k].ja);
  const bot3=Object.entries(t).sort((a,b)=>a[1]-b[1]).slice(0,3).map(([k])=>TRAITS[k].ja);
  const bestMatch=compats[0];
  const dt=getDriveType(d);
  let advice='';
  advice+=`【強み】${top3.join('、')}\n`;
  advice+=`【弱み】${bot3.join('、')}\n`;
  advice+=`【深層動機】${dt.ja}（${dt.pct}%） — ${dt.desc}\n\n`;

  // 動機ドライブ別のマネジメント提案
  if(dt.type==='money'){
    advice+=`【マネジメント】金銭ドライブ型：給与・残業手当・昇給制度を明確に示すと長期定着が見込めます。逆に他社からの好条件オファーには弱いので、定期的な待遇見直しを。\n`;
  }else if(dt.type==='prestige'){
    advice+=`【マネジメント】承認ドライブ型：成果を明示的に褒め、社内表彰の対象に。叱責は人前を避け個別に。プライドが折れると一気に弱るタイプ。\n`;
  }else if(dt.type==='freedom'){
    advice+=`【マネジメント】自由ドライブ型：厳格な細則よりも目標管理型で。裁量を与えて任せると伸びます。逆に過度なマイクロマネジメントは離脱リスク。\n`;
  }else if(dt.type==='relation'){
    advice+=`【マネジメント】関係ドライブ型：チーム配属で力を発揮。先輩・同僚との関係構築を支援することが定着の鍵。孤立すると一気に弱る。\n`;
  }

  if(flags.filter(f=>f.level==='red').length>0){
    advice+=`\n【要確認】以下のリスクフラグが検出されています：\n`;
    flags.filter(f=>f.level==='red').forEach(f=>advice+=`  ・${f.label}\n`);
    advice+=`現地FTIスタッフによる追加面談で背景を確認することを推奨します。\n`;
  }
  if(bestMatch&&bestMatch.r.score>=6){
    advice+=`\n【配属推奨】${bestMatch.m.name}様（${bestMatch.m.company}）との相性が最も良好です（${bestMatch.r.score.toFixed(1)}/10）。${bestMatch.r.advice}\n`;
  }
  if(r.revenge>6){advice+=`【見返し心リスク】高め。叱責や指導の伝え方に注意（人前ではなく個別に）。\n`;}
  if(r.impulse>6){advice+=`【衝動性リスク】高め。認知症ケア・同じ訴えの繰り返し対応でストレスを溜めやすい。\n`;}
  if(t.long>=7){advice+=`【長期就労意欲】高い（${t.long.toFixed(1)}/10）。継続雇用のシナリオで投資が回収しやすい候補者です。\n`;}
  else if(t.long<5){advice+=`【長期就労意欲】低めの可能性あり（${t.long.toFixed(1)}/10）。入国前に動機の再確認、入国後の早期フォローを推奨します。\n`;}
  if(t.resil<5){advice+=`【ストレス耐性】低めです。夜勤・看取りなど負荷の高い場面への配慮と、失敗時の励まし体制を準備してください。\n`;}
  if(t.careAcc<5){advice+=`【介助受容性】低め（${t.careAcc.toFixed(1)}/10）。排泄介助等への抵抗感の可能性。入国前に業務内容の丁寧な説明と実習を推奨します。\n`;}
  if(t.empathy>=7){advice+=`【共感性】高い（${t.empathy.toFixed(1)}/10）。利用者との信頼関係を築きやすい介護向きの資質です。\n`;}
  if(r.alc>6){advice+=`【飲酒リスク】高め。寮配置時に飲酒頻度の高い既存メンバーとは別グループ推奨。\n`;}
  return advice||'特記事項なし。一般的な受入プロセスで問題ありません。';
}

function getAllPeople(){
  const people=[];
  state.submissions.forEach(s=>{
    const sc=calcScores(s.answers);
    people.push({id:'c:'+s.id,refId:s.id,type:'candidate',name:s.name,subtitle:'候補者',traits:sc.traits,risks:sc.risks,drives:sc.drives});
  });
  state.members.forEach(m=>{
    people.push({id:'m:'+m.id,refId:m.id,type:'member',name:m.name,subtitle:m.company+(m.isBenchmark?' ★':''),isBenchmark:m.isBenchmark,traits:m.traits,risks:m.risks||{},drives:m.drives||{money:25,prestige:25,freedom:25,relation:25}});
  });
  return people;
}

function calcPairCompat(a,b){
  let sim=0,total=0;
  Object.keys(TRAITS).forEach(k=>{
    const av=a.traits[k]??5,bv=b.traits[k]??5;
    sim+=10-Math.abs(av-bv);total+=10;
  });
  let score=(sim/total)*10;
  const risks=[],positives=[];
  const aT=a.traits,bT=b.traits;
  const aR=a.risks||{},bR=b.risks||{};
  const aD=a.drives||{},bD=b.drives||{};
  if((aT.emo??5)<5&&(bT.emo??5)<5){score-=1.5;risks.push('両者とも情緒不安定→衝突リスク');}
  if((aR.alc||0)>6&&(bR.alc||0)>6){score-=1;risks.push('両者とも飲酒頻度高');}
  if((aT.clean??5)<5&&(bT.clean??5)<5){score-=1;risks.push('両者とも清潔感低');}
  if((aT.rule??5)<5&&(bT.rule??5)<5){score-=1;risks.push('両者ともルール意識低');}
  if((aR.impulse||0)>6&&(bR.impulse||0)>6){score-=1.5;risks.push('両者とも衝動性高');}
  if((aR.revenge||0)>6&&(bR.revenge||0)>6){score-=1.5;risks.push('両者とも見返し心強');}
  if((aD.prestige||0)>40&&(bD.prestige||0)>40){score-=1;risks.push('両者ともプライド型');}
  if((aD.money||0)>45&&(bD.money||0)>45){score-=0.5;risks.push('両者とも金銭志向過剰');}
  if(a.isBenchmark||b.isBenchmark){
    const other=a.isBenchmark?b:a;
    if((other.traits.consc??5)>=6)positives.push('ベンチマーク役の指導を受けやすい');
  }
  if((aT.comm??5)>=7&&(bT.comm??5)<5)positives.push(esc(a.name)+'のコミュ力が補完');
  if((bT.comm??5)>=7&&(aT.comm??5)<5)positives.push(esc(b.name)+'のコミュ力が補完');
  if((aT.long??5)>=8&&(bT.long??5)>=7)positives.push('双方が長期就労意欲');
  if((aD.relation||0)>35&&(bD.relation||0)>35)positives.push('双方が関係ドライブ型');
  score=Math.max(1,Math.min(10,score));
  let advice;
  if(score>=8)advice='相性◎ 同寮・近接配置を強く推奨';
  else if(score>=6)advice='相性○ 問題なし、近接配置可';
  else if(score>=4)advice='相性△ 初期1ヶ月は密に観察';
  else advice='相性× 別配置を強く推奨';
  return{score,sim:sim/total,risks,positives,advice};
}

function showPairDetail(aId,bId){
  const all=getAllPeople();
  const a=all.find(p=>p.id===aId);
  const b=all.find(p=>p.id===bId);
  if(!a||!b)return;
  const r=calcPairCompat(a,b);
  const traitRows=Object.entries(TRAITS).map(([k,v])=>{
    const av=a.traits[k]??5,bv=b.traits[k]??5;
    const diff=Math.abs(av-bv);
    const color=diff<=2?'#10B981':diff<=4?'#F59E0B':'#EF4444';
    return `<tr style="border-bottom:1px solid #F3F4F6;"><td style="padding:6px 8px;font-size:11px;">${v.ja}</td><td style="padding:6px;text-align:center;font-weight:600;font-size:12px;">${av.toFixed(1)}</td><td style="padding:6px;text-align:center;font-size:11px;color:${color};">↔ ${diff.toFixed(1)}</td><td style="padding:6px;text-align:center;font-weight:600;font-size:12px;">${bv.toFixed(1)}</td></tr>`;
  }).join('');
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto;" onclick="if(event.target===this)this.remove()"><div class="card" style="max-width:620px;width:100%;" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:14px;"><div><h2 style="margin:0;font-size:18px;font-weight:700;">${a.type==='candidate'?'👤':'⭐'} ${esc(a.name)} × ${b.type==='candidate'?'👤':'⭐'} ${esc(b.name)}</h2><p style="margin:4px 0 0;font-size:11px;color:#9CA3AF;">${esc(a.subtitle)} × ${esc(b.subtitle)}</p></div><div style="text-align:center;background:#E6F4F1;padding:10px 18px;border-radius:10px;"><div style="font-size:10px;color:#1E7168;">相性スコア</div><div style="font-size:28px;font-weight:800;color:#2A9D8F;line-height:1;">${r.score.toFixed(1)}</div><div style="font-size:10px;color:#1E7168;">/10</div></div></div><div style="background:#F9FAFB;padding:10px;border-radius:8px;margin-bottom:14px;"><p style="margin:0;font-size:13px;font-weight:600;">💡 ${esc(r.advice)}</p></div>${r.positives.length>0?`<div style="background:#D1FAE5;padding:10px;border-radius:8px;margin-bottom:10px;"><p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#065F46;">👍 良い点</p>${r.positives.map(p=>`<p style="margin:2px 0;font-size:12px;color:#065F46;">・${esc(p)}</p>`).join('')}</div>`:''}${r.risks.length>0?`<div style="background:#FEE2E2;padding:10px;border-radius:8px;margin-bottom:14px;"><p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#991B1B;">⚠ リスク</p>${r.risks.map(p=>`<p style="margin:2px 0;font-size:12px;color:#991B1B;">・${esc(p)}</p>`).join('')}</div>`:''}<h4 style="font-size:13px;font-weight:700;margin:14px 0 6px;">📊 特性比較</h4><table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#F9FAFB;border-bottom:2px solid #E5E7EB;"><th style="padding:6px;text-align:left;font-size:10px;color:#6B7280;">特性</th><th style="padding:6px;text-align:center;font-size:10px;color:#6B7280;">${esc(a.name).slice(0,8)}</th><th style="padding:6px;text-align:center;font-size:10px;color:#6B7280;">差</th><th style="padding:6px;text-align:center;font-size:10px;color:#6B7280;">${esc(b.name).slice(0,8)}</th></tr></thead><tbody>${traitRows}</tbody></table><button class="btn-primary btn-block" style="margin-top:14px;" onclick="this.closest('[style*=fixed]').remove()">閉じる</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function saveSettingsFromForm(){
  const name=document.getElementById('set-user').value.trim();
  const url=document.getElementById('set-url').value.trim();
  if(!name){alert('お名前を入力してください');return;}
  settings.userName=name;
  settings.backendUrl=url;
  saveSettings();
  document.querySelector('[style*=fixed]').remove();
  if(url){syncPull().then(()=>render());}else{render();}
}

async function testBackend(){
  const url=document.getElementById('set-url').value.trim();
  if(!url){alert('URLを入力してください');return;}
  try{
    const res=await fetch(url+'?action=read&ts='+Date.now());
    const json=await res.json();
    alert('✓ 接続OK\nサーバーから返却:\n候補者 '+((json.data?.submissions)||json.submissions||[]).length+'件\nメンバー '+((json.data?.members)||json.members||[]).length+'件');
  }catch(e){alert('✗ 接続エラー: '+e.message);}
}

function resetLocal(){
  localStorage.removeItem(STORAGE_KEY);
  state={submissions:[],members:seedMembers()};
  saveState();
  document.querySelector('[style*=fixed]').remove();
  render();
}

function importCode(){
  const code=document.getElementById('import-code').value.trim();
  if(!code){alert('コードを入力してください');return;}
  try{
    const payload=JSON.parse(decodeURIComponent(escape(atob(code))));
    if(!payload.n||!payload.a)throw new Error('invalid');
    const submission={id:uuid(),submittedAt:payload.t||new Date().toISOString(),name:payload.n,email:payload.e||'',answers:payload.a};
    state.submissions.push(submission);
    saveState();
    document.querySelector('[style*=fixed]').remove();
    setView('list');
    alert('読込完了：'+payload.n);
  }catch(e){alert('コードの形式が不正です: '+e.message);}
}

function deleteSubmission(id){
  if(!confirm('この提出を削除しますか？'))return;
  state.submissions=state.submissions.filter(s=>s.id!==id);
  saveState();setView('list');
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='yst-kaigo-assess-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(url);
}

function addMember(){
  const name=prompt('新規メンバー名（漢字 or カタカナ）：');
  if(!name)return;
  const company=prompt('所属施設（特養さくら園 / グループホームひまわり など）：')||'';
  const m={id:uuid(),name,company,traits:{},risks:{},drives:{money:25,prestige:25,freedom:25,relation:25},notes:''};
  Object.keys(TRAITS).forEach(k=>m.traits[k]=5);
  Object.keys(RISKS).forEach(k=>m.risks[k]=3);
  state.members.push(m);saveState();render();
}

function m_update(id,k,v){const m=state.members.find(x=>x.id===id);if(m){m[k]=v;saveState();}}
function m_setTrait(id,k,v){const m=state.members.find(x=>x.id===id);if(m){m.traits[k]=parseFloat(v);saveState();}}
function m_setRisk(id,k,v){const m=state.members.find(x=>x.id===id);if(m){m.risks[k]=parseFloat(v);saveState();}}
function m_setDrive(id,k,v){const m=state.members.find(x=>x.id===id);if(m){if(!m.drives)m.drives={};m.drives[k]=parseFloat(v);saveState();}}
function m_delete(id){if(!confirm('削除しますか？'))return;state.members=state.members.filter(x=>x.id!==id);saveState();render();}

function initCharts(){
  document.querySelectorAll('canvas[data-scores]').forEach(c=>{
    if(c._chart)c._chart.destroy();
    const scores=JSON.parse(c.dataset.scores);
    const labels=Object.keys(scores).map(k=>TRAITS[k]?TRAITS[k].ja:k);
    const data=Object.values(scores);
    c._chart=new Chart(c,{
      type:'radar',
      data:{labels,datasets:[{label:'スコア',data,backgroundColor:'rgba(42,157,143,.2)',borderColor:'#2A9D8F',borderWidth:2,pointBackgroundColor:'#2A9D8F',pointRadius:3}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{r:{min:0,max:10,beginAtZero:true,ticks:{stepSize:2,backdropColor:'transparent',font:{size:9}},pointLabels:{font:{size:10}}}}}
    });
  });
}
